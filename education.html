<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education</title>
    <link rel="stylesheet" href="education.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <section class="education-container">
        <p class="section-tag">My Journey </p>
        <h2 class="section-title">Education</h2>
        <hr class="attractive-hr">
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="education-card">
                    <div class="card-icon-box">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
                        </svg>
                    </div>
                    <div class="card-info">
                        <div class="title-row">
                            <h3 class="degree-title">BSc(CS)</h3>
                            <span class="status-badge">UG</span>
                        </div>
                        <p class="university-name">Davanagere University</p>
                        <div class="detail-item">
                            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <span>Davanagere, Karnataka, India</span>
                        </div>
                        <div class="detail-item">
                            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            <span>CGPA:<strong>7.3</strong></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="education-card">
                    <div class="card-info">
                        <div class="title-row">
                            <h3 class="degree-title">MCA</h3>
                            <span class="status-badge">Graduated</span>
                        </div>
                        <p class="university-name">Visvesvaraya Technological University</p>
                        <div class="detail-item">
                            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <span>Davanagere, Karnataka, India</span>
                        </div>
                        <div class="detail-item">
                            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            <span>CGPA:<strong>9.1</strong></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
